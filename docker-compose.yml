version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram_visa_bot
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

    # Load env variables from .env file
    env_file:
      - .env

    # Or set them explicitly (uncomment and fill in):
    # environment:
    #   TELEGRAM_BOT_TOKEN: "your_token"
    #   DB_HOST: "your_db_host"
    #   DB_USER: "your_db_user"
    #   DB_PASS: "your_db_password"
    #   DB_NAME: "your_db_name"
    #   VPS_HOST: "your_vps_ip"
    #   VPS_USER: "your_vps_user"
    #   VPS_PASS: "your_vps_password"

    volumes:
      # Persist logs outside the container
      - ./logs:/app/logs

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Network (optional, only needed if DB is also in Docker)
    # networks:
    #   - botnet

# networks:
#   botnet:
#     driver: bridge
